<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manage Programs</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body { font-family: Arial; padding: 30px; }

#modalOverlay {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.5);
}

#modalBox {
    background: white;
    width: 850px;
    margin: 60px auto;
    padding: 20px;
    border-radius: 8px;
}

.tableContainer {
    max-height: 320px;
    overflow-y: auto;
    border: 1px solid #ccc;
}

table { width: 100%; border-collapse: collapse; }

thead th {
    position: sticky;
    top: 0;
    background: #f5f5f5;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: center;
}

input[type="text"] { width: 95%; }

.invalid { border: 2px solid red !important; }

#errorMsg {
    color: red;
    font-weight: bold;
    margin-bottom: 10px;
}

button { margin: 5px; padding: 5px 10px; }
button:disabled { background: #ccc; }
</style>
</head>

<body>

<button id="openModal">Manage Programs</button>

<div id="modalOverlay">
  <div id="modalBox">

    <h3>Manage Programs</h3>
    <div id="errorMsg"></div>

    <div class="tableContainer">
      <table id="programTable">
        <thead>
          <tr>
            <th>Select</th>
            <th>Program *</th>
            <th>Program Obsolete</th>
            <th>Program Type *</th>
            <th>Type Obsolete</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <button id="createRow">Create Program</button>
    <button id="saveData">Save</button>
    <button id="deleteRowBtn" disabled>Delete</button>
    <button id="closeModal">Close</button>

  </div>
</div>

<script>
//var contextPath = /*[[${#httpServletRequest.contextPath}]]*/ '';

let programData = [];
let nextProgramId = 100;
let nextTypeId = 200;

function clearValidation(){
    $("#errorMsg").html("");
    $(".programName, .programType").removeClass("invalid");
}

function renderTable(){
    let tbody = $("#programTable tbody");
    tbody.empty();

    $.each(programData, function(i, item){

        let row = `
        <tr>
            <td><input type="radio" name="rowSelect"></td>

            <td><input type="text" class="programName" value="${item.name}"></td>

            <td><input type="checkbox" class="programObsolete" ${item.program_obsolete ? "checked" : ""}></td>

            <td><input type="text" class="programType" value="${item.type}"></td>

            <td><input type="checkbox" class="typeObsolete" ${item.type_obsolete ? "checked" : ""}></td>

            <input type="hidden" class="programId" value="${item.program_id}">
            <input type="hidden" class="typeId" value="${item.type_id}">
        </tr>`;

        tbody.append(row);
    });
}

/* OPEN MODAL → LOAD FROM BACKEND */
$("#openModal").click(function(){

    clearValidation();
    $("#errorMsg").text("Loading...");

    $.ajax({
        url: "api/programs/list",
        type: "GET",
        success: function(data){
            programData = data;
            renderTable();
            $("#errorMsg").text("");
            $("#modalOverlay").show();
            $("#deleteRowBtn").prop("disabled", true);
        },
        error: function(){
            $("#errorMsg").text("Failed to load data");
        }
    });
});

/* CREATE */
$("#createRow").click(function(){
    let row = `
    <tr>
        <td><input type="radio" name="rowSelect"></td>
        <td><input type="text" class="programName"></td>
        <td><input type="checkbox" class="programObsolete"></td>
        <td><input type="text" class="programType"></td>
        <td><input type="checkbox" class="typeObsolete"></td>

        <input type="hidden" class="programId" value="-1">
        <input type="hidden" class="typeId" value="-1">
    </tr>`;
    $("#programTable tbody").append(row);
});

/* ENABLE DELETE */
$(document).on("change", "input[name='rowSelect']", function(){
    $("#deleteRowBtn").prop("disabled", false);
});

/* DELETE */
$("#deleteRowBtn").click(function(){
    let row = $("input[name='rowSelect']:checked").closest("tr");
    row.remove();
    $("#deleteRowBtn").prop("disabled", true);
});

/* SAVE → SEND TO BACKEND */
$("#saveData").click(function(){

    clearValidation();

    let newData = [];
    let errors = [];
    let hasError = false;

    $("#programTable tbody tr").each(function(i){

        let pInput = $(this).find(".programName");
        let tInput = $(this).find(".programType");

        let p = pInput.val().trim();
        let t = tInput.val().trim();

        let rowErrors = [];

        if(p === "" && t === ""){
            rowErrors.push("Program is required");
            rowErrors.push("Program type is required");
            pInput.addClass("invalid");
            tInput.addClass("invalid");
            hasError = true;
        } else {
            if(p === ""){
                rowErrors.push("Program is required");
                pInput.addClass("invalid");
                hasError = true;
            }
            if(t === ""){
                rowErrors.push("Program type is required");
                tInput.addClass("invalid");
                hasError = true;
            }
        }

        if(rowErrors.length > 0){
            errors.push("Row " + (i+1) + ": " + rowErrors.join(", "));
        }

        if(p && t){
            newData.push({
                program_id: parseInt($(this).find(".programId").val()),
                type_id: parseInt($(this).find(".typeId").val()),
                name: p,
                type: t,
                program_obsolete: $(this).find(".programObsolete").is(":checked"),
                type_obsolete: $(this).find(".typeObsolete").is(":checked")
            });
        }
    });

    if(hasError){
        $("#errorMsg").html(errors.join("<br>"));
        return;
    }

    $.ajax({
        url: "api/programs/save",
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify(newData),
        success: function(){
            alert("Saved to backend!");
            console.log("Saved JSON:", newData);
            $("#modalOverlay").hide();
        }
    });
});

/* CLOSE */
$("#closeModal").click(function(){
    $("#modalOverlay").hide();
});

</script>

</body>
</html>
